  <body>
    <div class="container">

        <h1>Employees Leave Application</h1>

      </div>
      <form id="leaveForm">
        <label>Leave Type <span class="required">*</span></label>
        <select id="leaveType" required>
          <option value="">-- Select --</option>
          <option value="Half Day">Half Day (4 Hrs)</option>
          <option value="Short Leave">Short Leave (>1 to <5)</option>
          <option value="Mid Leave">Mid Leave (>5 to <15)</option>
          <option value="Long Leave">Long Leave (>15 to <30)</option>
        </select>


        <label>Leave Category <span class="required">*</span></label>
        <select id="leave" required>
          <option value="">-- Select --</option>
          <option value="Privelge">Privilege Leave</option>
          <option value="Casual">Casual Leave</option>
          <option value="Sick">Sick Leave</option>
        </select>


        <label>Employee Name <span class="required">*</span></label>
        <input list="employees" id="employeeName" required />
        <!-- Empty datalist; options will be added dynamically -->
        <datalist id="employees"></datalist>


        <label>Department <span class="required">*</span></label>
        <select id="department" required>
          <option value="">-- Select --</option>
          <option value="HR">HR</option>
          <option value="Admin">Admin</option>
          <option value="Accounts">Accounts</option>
          <option value="IT">IT</option>
          <option value="EXIM">EXIM</option>
          <option value="Sales">Sales</option>
          <option value="Purchase">Purchase</option>
          <option value="Ground Staff">Ground Staff</option>
          <option value="Quality">Quality</option>
        </select>


        <label>Leave Date <span class="required">*</span></label>
        <input type="date" id="leaveDate" required />


        <label>Leave Days (Half day = 0.5) <span class="required">*</span></label>
        <input type="number" id="leaveDays" min="0.5" step="0.5" value="0.5" required />


        <label>Reason <span class="required">*</span></label>
        <textarea id="reason" rows="2" required></textarea>


        <label>Rejoining Date <span class="required">*</span></label>
        <input type="date" id="rejoiningDate" required />


        <label>Upload Document</label>
        <input type="file" id="leaveDocument" />
        <button type="submit">Submit</button>
      </form>

    <script>
      // Handle form submission.
      document.getElementById("leaveForm").addEventListener("submit", function (e) {
        e.preventDefault();


        // Validate required fields.
        const requiredFields = ["leaveType", "employeeName", "department", "leaveDate", "leaveDays", "reason", "rejoiningDate"];
        for (let id of requiredFields) {
          const el = document.getElementById(id);
          if (!el.value.trim()) {
            alert("Please fill all required fields.");
            el.focus();
            return;
          }
        }


        const fileInput = document.getElementById('leaveDocument');
        const file = fileInput.files[0];
        const reader = new FileReader();


        reader.onload = function () {
          const fileContent = reader.result?.split(',')[1]; // Extract base64 portion.


          const form = {
            leaveType: document.getElementById("leaveType").value,
            leave: document.getElementById("leave").value,
            employeeName: document.getElementById("employeeName").value,
            department: document.getElementById("department").value,
            leaveDate: document.getElementById("leaveDate").value,
            leaveDays: document.getElementById("leaveDays").value,
            reason: document.getElementById("reason").value,
            rejoiningDate: document.getElementById("rejoiningDate").value,
            leaveDocument: file ? {
              bytes: fileContent,
              mimeType: file.type,
              filename: file.name
            } : null
          };


          google.script.run.withSuccessHandler(() => {
            alert("Form submitted successfully!");
            document.getElementById("leaveForm").reset(); // Reset the form.
          }).submitForm(form);
        };


        if (file) {
          reader.readAsDataURL(file);
        } else {
          reader.onload(); // Directly trigger if no file.
        }
      });


      // Load employee names dynamically from the server.
      function loadEmployeeData() {
        google.script.run.withSuccessHandler(function(employeeNames) {
          var datalist = document.getElementById("employees");
          // Clear any existing options.
          datalist.innerHTML = "";
          employeeNames.forEach(function(name) {
            var option = document.createElement("option");
            option.value = name;
            datalist.appendChild(option);
          });
        }).getEmployeeNames();
      }


      document.addEventListener("DOMContentLoaded", loadEmployeeData);
